# CI на каждый push/PR в main; CD (деплой на Staging) — только после успешного CI при push в main.
# Требуется self-hosted runner на сервере с метками: self-hosted, windows, wt2-staging

name: Backend Staging CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: backend-staging-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Maven tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Run tests
        run: mvn -B test

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-compose:
    name: Validate docker-compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: docker compose config
        run: docker compose -f deploy/docker-compose.yml config

  deploy:
    name: Deploy backend to Staging
    needs: [test, secrets, validate-compose]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, windows, wt2-staging]
    concurrency:
      group: staging-backend-deploy
      cancel-in-progress: false
    steps:
      - name: Pull BackendStaging (main)
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          Set-Location 'C:\WTStaging\BackendStaging'
          git fetch origin main
          git checkout main
          git pull origin main

      - name: Rebuild and restart backend
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          Set-Location 'C:\WTStaging\BackendStaging\deploy'
          docker compose up -d --build backend

      - name: Refresh monitoring stack (config-only, no image rebuild)
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          Set-Location 'C:\WTStaging\BackendStaging\deploy'
          docker compose up -d prometheus grafana loki promtail postgres-exporter

      - name: Wait for backend healthy
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $deadline = (Get-Date).AddMinutes(3)
          do {
            $status = docker inspect --format='{{.State.Health.Status}}' wt2-staging-backend 2>$null
            if ($status -eq 'healthy') {
              Write-Host "Backend is healthy"
              exit 0
            }
            Start-Sleep -Seconds 5
          } while ((Get-Date) -lt $deadline)
          Write-Error "Backend did not become healthy within 3 minutes (last status: $status)"
          docker compose -f C:\WTStaging\BackendStaging\deploy\docker-compose.yml logs --tail 80 backend
          exit 1
