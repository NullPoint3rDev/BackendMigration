# CI на каждый push/PR в main; CD (деплой на Staging) — только после успешного CI при push в main.
# Требуется self-hosted runner на Windows (метки: self-hosted, windows, wt2-staging).
# CD: checkout в _work (права у runner), docker compose + deploy/.env с C:\WTStaging (секреты, не в git).
# Шаги CD: shell powershell (5.1), не pwsh.

name: Backend Staging CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: backend-staging-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Maven tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Run tests
        run: mvn -B test

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-compose:
    name: Validate docker-compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: docker compose config
        run: docker compose -f deploy/docker-compose.yml config

  deploy:
    name: Deploy backend to Staging
    needs: [test, secrets, validate-compose]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, windows, wt2-staging]
    concurrency:
      group: staging-backend-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          clean: true

      - name: Verify Docker access
        shell: powershell
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          docker version 2>&1 | Out-Host
          if ($LASTEXITCODE -ne 0) {
            $account = [System.Security.Principal.WindowsIdentity]::GetCurrent().Name
            throw "Docker API not available for $account. Start Docker Desktop. Run the Actions runner service under the same Windows user as Docker (not NETWORK SERVICE). Add that user to local group docker-users, restart the runner service."
          }

      - name: Rebuild and restart backend
        shell: powershell
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $stagingEnv = 'C:\WTStaging\BackendStaging\deploy\.env'
          if (-not (Test-Path $stagingEnv)) {
            throw "Missing $stagingEnv - copy deploy/.env.example and configure staging secrets."
          }
          $src = Join-Path $env:GITHUB_WORKSPACE 'deploy'
          $dest = 'C:\WTStaging\BackendStaging\deploy'
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Get-ChildItem -Path $src | Where-Object { $_.Name -ne '.env' } | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination $dest -Recurse -Force
          }
          Set-Location (Join-Path $env:GITHUB_WORKSPACE 'deploy')
          docker compose --env-file $stagingEnv up -d --build backend

      - name: Refresh monitoring stack (config-only, no image rebuild)
        shell: powershell
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $stagingEnv = 'C:\WTStaging\BackendStaging\deploy\.env'
          Set-Location (Join-Path $env:GITHUB_WORKSPACE 'deploy')
          docker compose --env-file $stagingEnv up -d prometheus grafana loki promtail postgres-exporter

      - name: Wait for backend healthy
        shell: powershell
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $stagingEnv = 'C:\WTStaging\BackendStaging\deploy\.env'
          $compose = Join-Path $env:GITHUB_WORKSPACE 'deploy\docker-compose.yml'
          $deadline = (Get-Date).AddMinutes(5)
          do {
            $status = docker inspect --format='{{.State.Health.Status}}' wt2-staging-backend 2>$null
            if ($status -eq 'healthy') {
              Write-Host "Backend is healthy"
              exit 0
            }
            Start-Sleep -Seconds 5
          } while ((Get-Date) -lt $deadline)
          Write-Error "Backend did not become healthy within 3 minutes (last status: $status)"
          docker compose -f $compose --env-file $stagingEnv logs --tail 80 backend
          exit 1
