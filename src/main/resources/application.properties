# File upload configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=./uploads

# application.properties
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=INFO

# JWT Configuration
app.jwtSecret=wt2-dev-jwt-secret-2026-hs512-min-64-bytes-please-change-this-value-now
app.jwtExpirationInMs=43200000
app.email.verification.pepper=weldtelecom-email-verification-pepper-change-me


# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none


# Response for Core's testing
core.outbound.enabled=true
core.outbound.payload=010101002100080032000000C80011000100000000000000000000190A0F0A190D0A
core.outbound.append_crc8=false

# Response for time sync with Core
core.timesync.enabled=true

# Фоновая очистка данных удалённого аппарата (строк за транзакцию)
welding.machine.purge.batch-size=10000
# Через сколько дней после soft-delete чистить телеметрию/строку
welding.machine.purge.retention-days=7
# Как часто искать аппараты, готовые к очистке (мс). По умолчанию — раз в 60 мин
welding.machine.purge.scheduler-delay-ms=3600000