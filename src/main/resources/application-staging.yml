spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://host.docker.internal:5432/weldtelecom}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: ${SERVER_PORT:8085}
  address: 0.0.0.0

app:
  jwtSecret: ${APP_JWT_SECRET:change-me-staging-jwt-secret-min-32-chars}
  jwtExpirationInMs: ${APP_JWT_EXPIRATION_MS:43200000}

welding:
  machine:
    auto-create-on-unknown-mac: false
  archive:
    server:
      port: ${WELDING_ARCHIVE_SERVER_PORT:3003}
      ip: 0.0.0.0

logging:
  file:
    path: ${LOG_PATH:logs}
