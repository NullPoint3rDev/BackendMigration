spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/welding
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    org.alloy: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO