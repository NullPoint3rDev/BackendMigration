  jwtExpirationInMs: 43200000 # 12 hours in milliseconds

# Server Configuration (должно быть на корневом уровне)
server:
  port: 8085
  address: 0.0.0.0
  servlet:
    context-path: /api
  # Добавляем настройки для CORS
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024

  # Конфигурация сварочных аппаратов
  #welding:
  #  device:
  #    host: 95.172.58.219
  #    port: 3000
  #    mac: 8CAAB50C4254
  #  # Настройки для множественных аппаратов
  #  devices:
  #    - mac: 8CAAB50C4254
  #      type: MP-500
  #      ip: 95.172.58.219
  #      port: 3000
  #      description: Основной сварочный аппарат
  #    - mac: DC4F220AC7D4
  #      type: MX-Pulse
  #      ip: 95.172.58.220
  #      port: 3000
  #      description: Дополнительный сварочный аппарат
  # Тестовый режим для демонстрации
  test:
    enabled: false
    simulate_data: false
    interval_ms: 5000
  # Альтернативные настройки подключения
  connection:
    timeout_ms: 10000
    retry_interval_ms: 5000
    max_retries: 3
  parser:
    current_position: 36 # Позиция тока в payload (найдена автоматически как оптимальная)
    debug_mode: false # Отключить детальное логирование парсера (позиция найдена)

# Временный зонд для проверки посылок (MacPacketProbe). true — зонд на порту archive-сервера, листенер отключается.
mac:
  probe:
    enabled: false

# Конфигурация archive-style TCP сервера
welding:
  machine:
    # Не трогать welding_machine.last_online_on на каждом poll (снимает lock storm)
    last-online-throttle-seconds: 30
  archive:
    server:
      port: 3003  # Порт для TCP сервера (принимает все устройства)
      ip: 89.109.8.59 # IP адрес локального сервера
    allowed:
      macs: 8CAAB50C4254,E09806083396, ECFABCC9703B, C82B9620E506, E098060B22D2  #Разрешенные MAC-адреса (все устройства)
    parser:
      debug: false  # Отладочный режим парсера
    outbound:
      enabled: true  # Включить исходящие пакеты
      payload: ""  # HEX payload для отправки
      append_crc8: false  # Добавлять CRC8 к пакетам
    timesync:
      enabled: true  # Включить синхронизацию времени
  core:
    macs: E09806083396,DC4F22763D5C,E098060B22D2,C82B9620E506,ECFABCC9703B
    voltage_scale_idle: 16   # Масштаб для напряжения без сварки (idle)
    voltage_scale_welding: 10  # Масштаб для напряжения при сварке (welding)
    voltage_offset_idle: 0    # Калибровочный сдвиг (отключен)
    voltage_offset_welding: 0 # Калибровочный сдвиг (отключен)

# Расход проволоки в кг = поданная длина (м) × погонная масса (кг/м).
# Длина берётся по дельтам накопительного счётчика «Расход проволоки» с аппарата.
# Значение по умолчанию — сталь Ø1.2 мм (~0.0089 кг/м).
report:
  wire:
    linear-density-kg-per-meter: 0.0089

# Суточные плитки мониторинга (пересчёт из welding_machine_state)
monitor:
  daily-stats:
    timezone: Europe/Moscow
    stale-seconds: 60
    scheduler-delay-ms: 180000
    recompute-debounce-ms: 15000
  weld-segments:
    enabled: true
    report-use-precomputed: true
    timezone: Europe/Moscow
    # Раз в час — «сегодня + вчера» для аппаратов с телеметрией за последние 2 ч
    scheduler-delay-ms: 3600000
    activity-lookback-hours: 2
    recompute-debounce-ms: 300000
    # «Сегодня» в отчёте считаем свежим ~65 мин после hourly job
    today-stale-seconds: 3900
    # Ночной догон: сутки от 8 до 2 дней назад
    backfill-cron: "0 15 3 * * *"
    backfill-from-days-ago: 8
    backfill-to-days-ago: 2