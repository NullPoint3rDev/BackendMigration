  # Тестовый режим для демонстрации
  test:
    enabled: false
    simulate_data: false
    interval_ms: 5000
  # Альтернативные настройки подключения
  connection:
    timeout_ms: 10000
    retry_interval_ms: 5000
    max_retries: 3
  parser:
    current_position: 36 # Позиция тока в payload (найдена автоматически как оптимальная)
    debug_mode: false # Отключить детальное логирование парсера (позиция найдена)

# Конфигурация archive-style TCP сервера
welding:
  archive:
    server:
      port: 3000  # Порт для TCP сервера (принимает все устройства)
      ip: 192.168.10.137 # IP адрес локального сервера
    allowed:
      macs: 8CAAB50C4254,E09806083396  # Разрешенные MAC-адреса (все устройства)
    parser:
      debug: false  # Отладочный режим парсера
    outbound:
      enabled: true  # Включить исходящие пакеты
      payload: ""  # HEX payload для отправки
      append_crc8: false  # Добавлять CRC8 к пакетам
    timesync:
      enabled: true  # Включить синхронизацию времени
  core:
    voltage_scale_idle: 16   # Масштаб для напряжения без сварки (idle)
    voltage_scale_welding: 10  # Масштаб для напряжения при сварке (welding)