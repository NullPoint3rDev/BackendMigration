# Общие настройки для тестов (CI и локально). @TestPropertySource переопределяет только перечисленные ключи.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=VALUE,USER,KEY,YEAR,MONTH,ORDER,GROUP,TABLE,COLUMN,NAME,SETTINGS,TRANSLATION,TYPE,MAINTENANCE,ORGANIZATION,DESCRIPTION,STATUS,LEVEL,INDEX,TOKEN
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.properties.hibernate.dialect=org.alloy.config.H2TestDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# Как на staging: контроллеры в тестах @WebMvcTest дергают /api/...
server.servlet.context-path=/api

app.jwtSecret=test-jwt-secret-min-32-chars-for-hs512-signing-key
app.jwtExpirationInMs=43200000

# @DataJpaTest по умолчанию подменяет DataSource на embedded H2 (без MODE=PostgreSQL/NON_KEYWORDS) — отключаем.
spring.test.database.replace=none
