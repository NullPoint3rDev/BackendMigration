# Общие настройки для тестов (CI и локально). @TestPropertySource переопределяет только перечисленные ключи.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# Micrometer (Actuator) — бины org.alloy.metrics.* в @SpringBootTest
management.metrics.export.simple.enabled=true
