spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=VALUE,USER,KEY,YEAR,MONTH,ORDER,GROUP,TABLE,COLUMN,NAME,SETTINGS,TRANSLATION,TYPE,MAINTENANCE,ORGANIZATION,DESCRIPTION,STATUS,LEVEL,INDEX,TOKEN
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# В main/application.yml задан spring.jpa.properties.hibernate.dialect=PostgreSQLDialect (он приоритетнее database-platform
# и не перекрывается этим .properties). Переопределяем ИМЕННО этот ключ, иначе на H2 DDL получает PG-типы (oid/serial/int4)
# и @Lob String -> oid → "Data conversion error".
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.jpa.show-sql=true
server.servlet.context-path=/api

# @DataJpaTest по умолчанию подменяет DataSource на свой embedded H2 (без MODE=PostgreSQL и NON_KEYWORDS) —
# отключаем, чтобы использовался настроенный выше URL.
spring.test.database.replace=none