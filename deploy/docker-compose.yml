# Запуск из этой папки после клонирования двух репозиториев рядом:
#   parent/BackendStaging/   (этот репозиторий)
#   parent/FrontendStaging/
#
#   cd BackendStaging/deploy
#   copy .env.example .env
#   docker compose up -d --build

services:
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: wt2-staging-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_HTTP_PORT:-8085}:8085"
      - "${WELDING_ARCHIVE_SERVER_PORT:-3003}:${WELDING_ARCHIVE_SERVER_PORT:-3003}"
    environment:
      SPRING_PROFILES_ACTIVE: staging
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-weldtelecom}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-change-me-staging-jwt-secret-min-32-chars}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS:-43200000}
      WELDING_ARCHIVE_SERVER_PORT: ${WELDING_ARCHIVE_SERVER_PORT:-3003}
      # Actuator на отдельном порту, внутри docker-сети (Prometheus → backend:9100). Менять только вместе с prometheus.yml.
      MANAGEMENT_SERVER_PORT: ${MANAGEMENT_SERVER_PORT:-9100}
    volumes:
      - backend-logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Готовность = слушает management-порт Actuator (приложение поднялось).
    # В jre-jammy нет curl/wget, поэтому проверяем TCP через bash /dev/tcp.
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/${MANAGEMENT_SERVER_PORT:-9100}' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s

  frontend:
    build:
      context: ${FRONTEND_BUILD_CONTEXT:-../../FrontendStaging}
      dockerfile: Dockerfile
    container_name: wt2-staging-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Мониторинг ───────────────────────────────────────────────────────────
  # Prometheus: только внутри docker-сети, наружу НЕ публикуется.
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: wt2-staging-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Loki: хранилище логов, только внутри docker-сети.
  loki:
    image: grafana/loki:3.0.0
    container_name: wt2-staging-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Promtail: собирает stdout контейнеров + файлы логов backend → Loki.
  promtail:
    image: grafana/promtail:3.0.0
    container_name: wt2-staging-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - backend-logs:/backend-logs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy

  # postgres_exporter: метрики PostgreSQL (БД на Windows-хосте).
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: wt2-staging-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@host.docker.internal:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-weldtelecom}?sslmode=disable"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Grafana: доступна по LAN-адресу сервера на порту GRAFANA_HTTP_PORT (по умолчанию 3050).
  grafana:
    image: grafana/grafana:11.1.0
    container_name: wt2-staging-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_HTTP_PORT:-3050}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy

volumes:
  backend-logs:
  prometheus-data:
  loki-data:
  grafana-data:
